<!DOCTYPE html>
<html>
<head><title>Change Password - WorkSphere</title></head>
<body>
    <h2>Change Password</h2>
    <form>
        <input type="password" placeholder="Current Password" required><br>
        <input type="password" placeholder="New Password (min 8 chars)" required><br>
        <input type="password" placeholder="Confirm New Password" required><br>
        <button type="submit">Change Password</button>
    </form>
</body>
</html>
